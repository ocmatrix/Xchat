<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Nexus P2P Terminal</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#D4AF37" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nexus" />
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/nexus/192/192" />
    <script>
      // Sovereign Node: Environmental Safety Shim
      // Silences benign cross-origin frame errors common in sandboxed environments
      (function() {
        const originalConsoleError = console.error;
        console.error = function(...args) {
          const msg = args.map(a => String(a)).join(' ');
          if (msg.includes("origin' from 'Location'") || msg.includes("cross-origin frame")) {
            return; // Silence this specific benign environmental error
          }
          originalConsoleError.apply(console, args);
        };

        const silence = (e, msg) => {
          if (msg && (msg.includes("origin' from 'Location'") || msg.includes("cross-origin frame"))) {
            if (e.stopImmediatePropagation) e.stopImmediatePropagation();
            if (e.stopPropagation) e.stopPropagation();
            if (e.preventDefault) e.preventDefault();
            return true;
          }
          return false;
        };
        window.addEventListener('error', (e) => {
          silence(e, e.message || (e.error && e.error.message));
        }, true);
        window.addEventListener('unhandledrejection', (e) => {
          silence(e, e.reason && e.reason.message ? e.reason.message : String(e.reason));
        }, true);

        // Register Service Worker for PWA Linkage
        if ('serviceWorker' in navigator) {
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(reg => {
              console.log('SW::REGISTERED::SOVEREIGN_NODE_ONLINE', reg.scope);
            }).catch(err => {
              console.log('SW::REGISTRATION_FAILED', err);
            });
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
